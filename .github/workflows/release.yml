name: Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Gõ tag muốn release (ví dụ: munin-cursor-v0.1.0, hoặc "all" để release toàn bộ)'
        required: true
        default: 'all'
  push:
    tags:
      - "spec-v*"
      - "munin-sdk-v*"
      - "sdk-py-v*"
      - "munin-cursor-v*"
      - "munin-claude-v*"
      - "munin-gemini-v*"
      - "munin-openclaw-v*"
      - "munin-mcp-server-v*"
      - "munin-antigravity-v*"
      - "munin-kilo-v*"
      - "munin-qwen-v*"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm lint && pnpm build && pnpm test
          pnpm test:contract:mock &
          MOCK_PID=$!
          echo "Waiting for mock server on port 4010..."
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4010/api/mcp/capabilities > /dev/null 2>&1; then
              echo "Mock server ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Mock server failed to start within 30s"
              kill "$MOCK_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          pnpm test:contract
          kill "$MOCK_PID" 2>/dev/null || true

  release-routing:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      target: ${{ steps.resolve.outputs.target }}
      mode: ${{ steps.resolve.outputs.mode }}
    steps:
      - name: Resolve package from tag
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Release tag: ${TAG}"
          if [ "${TAG}" = "all" ]; then
            echo "mode=all" >> $GITHUB_OUTPUT
          else
            echo "mode=single" >> $GITHUB_OUTPUT
            case "${TAG}" in
              spec-v*) echo "target=packages/spec" >> $GITHUB_OUTPUT ;;
              munin-sdk-v*) echo "target=packages/ts-sdk" >> $GITHUB_OUTPUT ;;
              sdk-py-v*) echo "target=packages/python-sdk" >> $GITHUB_OUTPUT ;;
              munin-cursor-v*) echo "target=adapters/cursor" >> $GITHUB_OUTPUT ;;
              munin-claude-v*) echo "target=adapters/claude" >> $GITHUB_OUTPUT ;;
              munin-gemini-v*) echo "target=adapters/gemini" >> $GITHUB_OUTPUT ;;
              munin-openclaw-v*) echo "target=adapters/openclaw" >> $GITHUB_OUTPUT ;;
              munin-mcp-server-v*) echo "target=adapters/mcp-server" >> $GITHUB_OUTPUT ;;
              munin-antigravity-v*) echo "target=adapters/antigravity" >> $GITHUB_OUTPUT ;;
              munin-kilo-v*) echo "target=adapters/kilo" >> $GITHUB_OUTPUT ;;
              munin-qwen-v*) echo "target=adapters/qwen" >> $GITHUB_OUTPUT ;;
              *) echo "Unsupported tag format"; exit 1 ;;
            esac
          fi

  publish:
    runs-on: ubuntu-latest
    needs: release-routing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: |
          npm config set //registry.npmjs.org/:_authToken "${{ secrets.NPM_TOKEN }}"
          # Skip duplicate-version errors so partial re-runs / unchanged packages don't break the workflow
          publish_safely() {
            local cmd="$1"
            set +e
            OUT=$(eval "$cmd" 2>&1)
            CODE=$?
            set -e
            echo "$OUT"
            if [ "$CODE" -ne 0 ]; then
              if echo "$OUT" | grep -qiE "previously published|cannot publish over|EPUBLISHCONFLICT|403"; then
                echo "::warning::Skipping already-published version(s)"
                return 0
              fi
              return "$CODE"
            fi
          }
          if [ "${{ needs.release-routing.outputs.mode }}" = "all" ]; then
            echo "Publishing all packages in recursive mode..."
            publish_safely "pnpm publish -r --no-git-checks --access public"
          else
            echo "Publishing single package in ${{ needs.release-routing.outputs.target }}..."
            publish_safely "pnpm publish --no-git-checks --access public -C ${{ needs.release-routing.outputs.target }}"
          fi
